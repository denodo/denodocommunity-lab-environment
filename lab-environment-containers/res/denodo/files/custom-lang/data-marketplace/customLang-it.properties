administration.server.vectorDb.disclaimerPopup.aiIntegration.introduction=Leggi attentamente la seguente dichiarazione di non responsabilità prima di abilitare la funzione "Integrazione IA" di Denodo Assistant nel Data Marketplace, che invia i metadati delle visualizzazioni Denodo al fornitore di Servizi IA di terze parti che il Cliente ha concesso in licenza separatamente e ha collegato al software Denodo (il "Servizio IA"). Utilizzando questa app e interagendo con il Servizio IA configurato, riconosci e accetti quanto segue:
