administration.personalization.elements.allowHtml.info=Con questa opzione è possibile configurare se le proprietà e le descrizioni HTML sono consentite per categorie, tag, database, viste, servizi web, gruppi e proprietà. Se non consenti input HTML, le descrizioni degli elementi verranno sempre visualizzate come testo normale e le proprietà di tipo HTML esistenti verranno convertite nella tipologia "Testo lungo" (non è possibile creare nuove proprietà HTML).
