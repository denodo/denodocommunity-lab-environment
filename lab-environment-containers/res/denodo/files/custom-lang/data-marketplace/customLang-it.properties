administration.personalization.denodoAssistant.assistedQuery.disclaimer.contextPersistence.content=È responsabilità del Cliente esaminare i termini tra esso e il Servizio IA per quanto riguarda la conservazione delle informazioni inviate al Servizio IA per conto del Cliente
administration.personalization.denodoAssistant.assistedQuery.disclaimer.dataPrivacy=Privacy dei dati
administration.personalization.denodoAssistant.assistedQuery.disclaimer.dataPrivacy.content=Abilitando la funzione "Query assistita" nel Data Marketplace, il Cliente indica a Denodo Assistant di raccogliere e inviare query in linguaggio naturale e metadati correlati, compresi eventuali dati personali che potrebbero essere inclusi, al Servizio IA di terze parti per l'elaborazione. Le informazioni elaborate dal Servizio IA in questo modo sono soggette alle policy di raccolta, utilizzo, conservazione e divulgazione dei dati di tale Servizio IA. Denodo non si assume alcuna responsabilità per le policy e le pratiche sulla privacy dei Servizi IA. Si consiglia ai Clienti di leggere le informative sulla privacy dei fornitori di Servizi IA, in quanto possono differire da quelle di Denodo.
administration.personalization.denodoAssistant.assistedQuery.disclaimer.finalAgreement=Continuando a utilizzare la funzione "Query assistita" di Denodo Assistant nel Data Marketplace e interagendo con le funzioni del Servizio IA esterno, accetti di rispettare i termini e condizioni delineati nella presente dichiarazione di non responsabilità. Se non sei d'accordo con una qualsiasi parte di questa dichiarazione di non responsabilità, non utilizzare la funzione "Query assistita".
administration.personalization.denodoAssistant.assistedQuery.disclaimer.introduction=Leggi attentamente la seguente dichiarazione di non responsabilità prima di abilitare la funzione "Query assistita" di Denodo Assistant nel Data Marketplace, che invia i metadati delle visualizzazioni Denodo al fornitore di Servizi IA di terze parti che il Cliente ha concesso in licenza separatamente e ha collegato al software Denodo (il "Servizio IA"). Utilizzando questa funzione e interagendo con il Servizio IA, riconosci e accetti quanto segue:
administration.personalization.denodoAssistant.assistedQuery.disclaimer.licenseTerms=Condizioni di licenza
administration.personalization.denodoAssistant.assistedQuery.disclaimer.licenseTerms.content=Denodo consente una connessione al Servizio IA allo scopo di sfruttarne le capacità con il software Denodo. I Clienti devono disporre di un account aziendale con un Servizio IA per utilizzare questa funzionalità. L'utilizzo del Servizio IA da parte del Cliente è soggetto ai termini e condizioni del contratto di licenza del Cliente con tale Servizio IA.
administration.personalization.denodoAssistant.assistedQuery.disclaimer.limitedAccessToCustomerData=Accesso limitato ai dati del Cliente
administration.personalization.denodoAssistant.assistedQuery.disclaimer.limitedAccessToCustomerData.content=Quando l'opzione "Usa dati di esempio" non è abilitata, Denodo Assistant è progettato per acquisire e inviare esclusivamente i metadati delle visualizzazioni Denodo al Servizio IA. Non trasmette alcun dato sottostante del cliente, come le righe di dati contenute nelle visualizzazioni. Denodo Assistant si concentra esclusivamente sull'utilizzo dei metadati per generare query VQL attraverso il Servizio IA.
administration.personalization.denodoAssistant.assistedQuery.disclaimer.responsibilityAndLiability=Responsabilità e obblighi
administration.personalization.denodoAssistant.assistedQuery.disclaimer.responsibilityAndLiability.content=Quando l'opzione "Usa dati di esempio" non è abilitata, le query VQL generate dal Servizio IA si basano esclusivamente sulla query in linguaggio naturale e sui metadati delle visualizzazioni Denodo fornite. Come per qualsiasi contenuto generato dall'IA, è fondamentale esaminare e testare a fondo le query generate dal Servizio IA. Denodo non è responsabile di alcun errore, omissione o conseguenza negativa che potrebbe derivare dall'uso di un Servizio IA o dalle query VQL generate.
administration.personalization.denodoAssistant.assistedQuery.disclaimer.title=Dichiarazione di non responsabilità per le query assistite
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.contextPersistence=Persistenza del contesto
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.contextPersistence.content=È responsabilità del Cliente rivedere i termini tra esso e il Servizio IA in relazione alla conservazione delle informazioni inviate al Servizio IA per conto del Cliente.
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.dataPrivacy=Privacy dei dati
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.dataPrivacy.content=Abilitando la funzione "Query assistita" di Denodo Assistant nel Data Marketplace, con "Usa dati campione" abilitato, il Cliente ordina al Data Marketplace di raccogliere e inviare query in linguaggio naturale, metadati correlati e dati campione, inclusi eventuali dati personali che potrebbero essere inclusi, al Servizio IA di terze parti per l'elaborazione. Le informazioni elaborate dal Servizio IA in questo modo sono soggette alle policy di raccolta, utilizzo, conservazione e divulgazione dei dati di tale Servizio IA. Denodo non si assume alcuna responsabilità per le policy e le pratiche sulla privacy dei Servizi IA. Si consiglia ai Clienti di leggere le informative sulla privacy dei fornitori di Servizi IA, in quanto possono differire da quelle di Denodo.
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.finalAgreement=Continuando a utilizzare la funzione "Query assistita" di Denodo Assistant nel Data Marketplace, con "Usa dati campione" abilitato, e interagendo con le funzionalità del servizio IA esterno, accetti di rispettare i termini e condizioni delineati nella presente dichiarazione di non responsabilità. Se non sei d'accordo con qualsiasi parte di questa dichiarazione di non responsabilità, non utilizzare la funzione "Query assistita" con "Usa dati campione" abilitato.
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.introduction=Leggi attentamente la seguente dichiarazione di non responsabilità prima di abilitare la funzione "Query assistita" di Denodo Assistant nel Data Marketplace, con "Usa dati campione" abilitato, che invia i dati delle viste Denodo al fornitore di servizi di IA di terze parti che tu, in qualità di cliente, hai concesso in licenza separatamente e collegato al software Denodo (il "Servizio IA"). Utilizzando questa app e interagendo con il Servizio IA configurato, riconosci e accetti quanto segue:
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.licenseTerms=Condizioni di licenza
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.licenseTerms.content=Denodo consente una connessione al Servizio IA allo scopo di sfruttarne le capacità con il software Denodo. I clienti devono disporre di un account aziendale con un Servizio IA consentito per utilizzare questa funzionalità. L'utilizzo del Servizio IA da parte del Cliente è soggetto ai termini e condizioni del contratto di licenza del Cliente con tale Servizio IA
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.responsibilityAndLiability=Responsabilità e obblighi
administration.personalization.denodoAssistant.assistedQuery.sampleData.disclaimer.responsibilityAndLiability.content=Le informazioni generate dal Servizio IA si basano sulla query in linguaggio naturale, sui metadati e, con l'opzione "Usa dati campione", sui dati delle visualizzazioni Denodo fornite. Come per qualsiasi contenuto generato dall'IA, è fondamentale esaminare e testare a fondo le query generate dal Servizio IA. Denodo non è responsabile di alcun errore, omissione o conseguenza negativa che potrebbe derivare dall'uso del Servizio IA o dalle query VQL generate.
