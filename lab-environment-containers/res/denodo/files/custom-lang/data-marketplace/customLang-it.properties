administration.server.vectorDb.disclaimerPopup.aiIntegration.responsibilityLiability.description=Quando l'opzione "Usa dati di esempio" non è abilitata, le informazioni generate dal Servizio IA si basano esclusivamente sui metadati delle visualizzazioni Denodo fornite. Come per qualsiasi contenuto generato dall'IA, è fondamentale esaminare a fondo il contenuto generato dal Servizio IA. Denodo non è responsabile per eventuali errori, omissioni o conseguenze negative che potrebbero derivare dall'uso del Servizio IA o dalle informazioni generate da quest'ultimo.
