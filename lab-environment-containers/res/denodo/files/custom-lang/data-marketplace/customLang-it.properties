administration.personalization.denodoAssistant.chatbot.deepQueryConfiguration.defaultRows.info=Definisce il numero di righe di risultati che DeepQuery manterrà e visualizzerà dalle esecuzioni del database. Viene utilizzato per troncare i risultati dell'esecuzione che vengono inviati all'LLM, restituiti dall'API e incorporati in report/visualizzazioni. Riduce token/costi/latenza e mantiene gli output leggibili.
