administration.personalization.elements.allowImages.confirm=Confermi di non voler consentire le immagini nelle descrizioni e nelle proprietà HTML nel Data Marketplace? Le immagini esistenti nelle descrizioni e nelle proprietà HTML verranno rimosse. Questa azione non può essere annullata!
administration.personalization.elements.allowImages.info=Con questa opzione è possibile consentire le immagini nelle descrizioni HTML. Le immagini verranno visualizzate all'interno di un iframe (in una sandbox per motivi di sicurezza). Quando si consentono le immagini, è necessario specificare i domini su cui si trovano. Questi domini saranno inseriti nella white list nella Policy di sicurezza dei contenuti. Ogni dominio deve essere un URL che includa il protocollo (http:// o https://), il nome del dominio e la porta. Esempio di dominio valido: https://www.denodo.com:9090. Se abiliti le immagini, nell'editor HTML verrà visualizzato un pulsante che aprirà un pop-up per specificare l'URL, la larghezza e l'altezza dell'immagine.
administration.personalization.elements.browse.subtitle=Con questa opzione è possibile specificare se gli utenti possono sfogliare il catalogo per database e cartelle o meno. Se disabiliti questa opzione, puoi specificare se durante la ricerca e la navigazione nel catalogo devono essere visualizzati solo i servizi web e le visualizzazioni con una categoria assegnata.
