administration.server.vectorDb.disclaimerPopup.aiIntegration.limitedAccessToCostumerData.description=Quando l'opzione "Usa dati di esempio" non è abilitata, Denodo Assistant è progettato per acquisire e inviare esclusivamente i metadati delle visualizzazioni Denodo al Servizio IA. Non trasmette alcun dato sottostante del cliente, come le righe di dati contenute nelle visualizzazioni. Denodo Assistant si concentra esclusivamente sull'utilizzo dei metadati per generare informazioni attraverso il Servizio IA.
